<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العمادة - التدريب التطبيقي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* تعريف متغيرات الألوان للوضع الفاتح والليلي */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e2e8f0;
            --controls-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --controls-bg: #2d2d2d;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center;
        }

        .dashboard-container {
            width: 100%; max-width: 1200px;
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden; position: relative;
        }

        .dashboard-container::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 120px;
            background: linear-gradient(135deg, #055934 0%, #0a3d28 100%); z-index: 0;
        }
        .dashboard-container::after {
            content: ""; position: absolute; top: 120px; left: 0; right: 0; height: 6px;
            background: #C5A059; z-index: 1;
        }

        .header-content {
            position: relative; z-index: 2; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            color: #ffffff; height: 120px;
        }
        .titles-area h1 { font-size: 26px; margin: 0; font-weight: 700; color: white; }
        .titles-area p { font-size: 15px; margin: 5px 0 0; opacity: 0.9; color: white; }
        .logo-img { height: 70px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        .main-content { padding: 40px; position: relative; z-index: 2; }

        /* أزرار الإجراءات (تصدير، طباعة، وضع ليلي) */
        .actions-toolbar {
            display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;
        }
        .btn-action {
            background: var(--controls-bg); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-family: 'Tajawal'; font-weight: 600;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-action:hover { filter: brightness(0.9); }
        .btn-action.btn-export { background: #1e8e3e; color: white; border: none; }
        .btn-action.btn-print { background: #34495e; color: white; border: none; }

        .controls-area {
            background: var(--controls-bg); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 10px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .controls-area label { font-size: 18px; font-weight: 700; color: #055934; margin-left: 15px; }
        .controls-area select {
            padding: 12px 20px; font-size: 16px; border: 2px solid var(--border-color);
            border-radius: 8px; font-family: 'Tajawal', sans-serif;
            min-width: 300px; cursor: pointer; outline: none;
            background: var(--bg-card); color: var(--text-main);
        }

        /* حركات الدخول */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            padding: 20px; border-radius: 12px; text-align: center; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; overflow: hidden;
            animation: slideUp 0.6s ease forwards; opacity: 0;
        }
        /* تأخير بسيط لكل بطاقة */
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        .stat-card:nth-child(5) { animation-delay: 0.5s; }
        .stat-card:nth-child(6) { animation-delay: 0.6s; }

        .stat-card h3 { margin: 0 0 10px 0; font-size: 18px; font-weight: 500; }
        .stat-card .number { font-size: 36px; font-weight: 800; margin: 0; }
        .stat-card .percentage { font-size: 14px; opacity: 0.9; margin-top: 5px; font-weight: 500; }
        
        .card-total { background: #34495e; }
        .card-gold { background: #C5A059; border: 2px solid #a88440; }
        .card-green { background: #1e8e3e; }
        .card-yellow { background: #f9ab00; color: #333; }
        .card-red { background: #d93025; }
        .card-unknown { background: #9e9e9e; }

        .chart-container {
            width: 100%; max-width: 500px; margin: 0 auto;
            background: var(--bg-card); padding: 20px; border-radius: 15px;
            border: 1px solid var(--border-color);
            animation: slideUp 0.8s ease forwards;
        }

        #loading { text-align: center; font-size: 18px; color: var(--text-muted); margin: 40px 0; }

        /* تنسيق خاص للطباعة (يخفي الأزرار ويجهز الورقة) */
        @media print {
            body { background: white; padding: 0; }
            .dashboard-container { box-shadow: none; max-width: 100%; }
            .actions-toolbar, .controls-area select, .controls-area label { display: none !important; }
            .controls-area { border: none; padding: 0; margin-bottom: 20px; background: transparent; }
            .controls-area::after { content: "تقرير مطبوع - التدريب التطبيقي"; font-weight: bold; font-size: 18px; }
            .chart-container { border: none; box-shadow: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="header-content">
        <div class="titles-area">
            <h1>إحصائيات التدريب التطبيقي</h1>
            <p>لوحة تحكم العمادة - الكلية التطبيقية</p>
        </div>
        <div>
            <img src="logo.jfif" alt="شعار الكلية" class="logo-img">
        </div>
    </header>

    <div class="main-content">
        <div class="actions-toolbar" id="actionsToolbar" style="display:none;">
            <button class="btn-action" onclick="toggleTheme()" title="تغيير المظهر">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
            </button>
            <button class="btn-action btn-export" onclick="exportDataToCSV()">
                <i class="fa-solid fa-file-excel"></i> تصدير البيانات (Excel)
            </button>
            <button class="btn-action btn-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> طباعة / تقرير PDF
            </button>
        </div>

        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري استيراد وتحليل البيانات...</div>
        
        <div id="dashboardWrapper" style="display:none;">
            <div class="controls-area">
                <div>
                    <label for="supervisorFilter"><i class="fa-solid fa-filter"></i> تصفية حسب المشرف:</label>
                    <select id="supervisorFilter" onchange="updateDashboard()">
                        <option value="all">جميع المشرفين (كل الطلاب)</option>
                    </select>
                </div>
                <div style="color:var(--text-muted); font-size:14px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> بيانات محدثة لحظياً
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card card-total">
                    <h3>إجمالي الطلاب</h3>
                    <div class="number" id="countTotal">0</div>
                    <div class="percentage">100%</div>
                </div>
                <div class="stat-card card-gold">
                    <h3>النطاق الذهبي <i class="fa-solid fa-star"></i></h3>
                    <div class="number" id="countGold">0</div>
                    <div class="percentage" id="pctGold">0%</div>
                </div>
                <div class="stat-card card-green">
                    <h3>النطاق الأخضر <i class="fa-solid fa-circle-check"></i></h3>
                    <div class="number" id="countGreen">0</div>
                    <div class="percentage" id="pctGreen">0%</div>
                </div>
                <div class="stat-card card-yellow">
                    <h3>النطاق الأصفر <i class="fa-solid fa-triangle-exclamation"></i></h3>
                    <div class="number" id="countYellow">0</div>
                    <div class="percentage" id="pctYellow">0%</div>
                </div>
                <div class="stat-card card-red">
                    <h3>النطاق الأحمر <i class="fa-solid fa-circle-exclamation"></i></h3>
                    <div class="number" id="countRed">0</div>
                    <div class="percentage" id="pctRed">0%</div>
                </div>
                <div class="stat-card card-unknown">
                    <h3>غير محدد <i class="fa-solid fa-circle-question"></i></h3>
                    <div class="number" id="countUnknown">0</div>
                    <div class="percentage" id="pctUnknown">0%</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="zonesChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // الرابط المباشر لجوجل شيت
    const sheetDataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSORepMr-6bAomcs1Myh3qsrHPg9ks06TN1qZ9840GRo-fsLX2xQt7__kTgamr57mY82MaRWnOuAQ0/pub?gid=216850767&single=true&output=csv';
    
    let allStudentsData = []; 
    let myChart = null;

    async function initDashboard() {
        try {
            const response = await fetch(sheetDataUrl + '&t=' + new Date().getTime());
            const data = await response.text();
            
            const rows = data.split('\n');
            let supervisorsSet = new Set();

            for (let i = 1; i < rows.length; i++) {
                let cols = [];
                let inQuotes = false;
                let col = '';
                for (let char of rows[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cols.push(col); col = ''; }
                    else col += char;
                }
                cols.push(col);

                // استخراج الرقم والاسم لتصدير البيانات
                if (cols.length >= 4 && cols[0].trim() !== '') {
                    const id = cols[0].replace(/["\r]/g, '').trim();
                    const sName = cols[1].replace(/["\r]/g, '').trim();
                    const zone = cols[2].replace(/["\r]/g, '').trim();
                    const supervisor = cols[3].replace(/["\r]/g, '').trim() || 'بدون مشرف';
                    
                    allStudentsData.push({ id, name: sName, zone, supervisor });
                    
                    if(supervisor !== 'بدون مشرف') {
                        supervisorsSet.add(supervisor);
                    }
                }
            }

            const supervisorSelect = document.getElementById('supervisorFilter');
            supervisorsSet.forEach(sup => {
                let option = document.createElement('option');
                option.value = sup; option.text = sup;
                supervisorSelect.appendChild(option);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardWrapper').style.display = 'block';
            document.getElementById('actionsToolbar').style.display = 'flex';

            updateDashboard();
        } catch (error) {
            document.getElementById('loading').innerHTML = '<span style="color:red;">حدث خطأ في تحميل البيانات. يرجى المحاولة لاحقاً.</span>';
        }
    }

    function updateDashboard() {
        const selectedSupervisor = document.getElementById('supervisorFilter').value;
        
        let filteredData = allStudentsData;
        if (selectedSupervisor !== 'all') {
            filteredData = allStudentsData.filter(student => student.supervisor === selectedSupervisor);
        }

        const total = filteredData.length;
        let counts = { gold: 0, green: 0, yellow: 0, red: 0, unknown: 0 };

        filteredData.forEach(student => {
            if (student.zone === 'ذهبي') counts.gold++;
            else if (student.zone === 'أخضر') counts.green++;
            else if (student.zone === 'أصفر') counts.yellow++;
            else if (student.zone === 'أحمر') counts.red++;
            else counts.unknown++;
        });

        const calcPct = (num, tot) => tot === 0 ? 0 : Math.round((num / tot) * 100);

        document.getElementById('countTotal').innerText = total;
        document.getElementById('countGold').innerText = counts.gold;
        document.getElementById('pctGold').innerText = calcPct(counts.gold, total) + '%';
        document.getElementById('countGreen').innerText = counts.green;
        document.getElementById('pctGreen').innerText = calcPct(counts.green, total) + '%';
        document.getElementById('countYellow').innerText = counts.yellow;
        document.getElementById('pctYellow').innerText = calcPct(counts.yellow, total) + '%';
        document.getElementById('countRed').innerText = counts.red;
        document.getElementById('pctRed').innerText = calcPct(counts.red, total) + '%';
        document.getElementById('countUnknown').innerText = counts.unknown;
        document.getElementById('pctUnknown').innerText = calcPct(counts.unknown, total) + '%';

        drawChart(counts.gold, counts.green, counts.yellow, counts.red, counts.unknown);
    }

    function drawChart(gold, green, yellow, red, unknown) {
        const ctx = document.getElementById('zonesChart').getContext('2d');
        if (myChart) myChart.destroy();

        // لون الخطوط حسب الوضع الليلي/الفاتح
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const textColor = isDark ? '#e4e6eb' : '#666';

        Chart.defaults.font.family = 'Tajawal';
        Chart.defaults.color = textColor;
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['الذهبي', 'الأخضر', 'الأصفر', 'الأحمر', 'غير محدد'],
                datasets: [{
                    data: [gold, green, yellow, red, unknown],
                    backgroundColor: ['#C5A059', '#1e8e3e', '#f9ab00', '#d93025', '#9e9e9e'],
                    borderWidth: 2,
                    borderColor: isDark ? '#1e1e1e' : '#ffffff'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '65%',
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 14, family: 'Tajawal' }, padding: 20 } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || ''; let value = context.raw;
                                let total = context.chart._metasets[context.datasetIndex].total;
                                let percentage = Math.round((value / total) * 100) + '%';
                                return label + ': ' + value + ' طالب (' + percentage + ')';
                            }
                        }
                    }
                }
            }
        });
    }

    // --- الوظائف الجديدة --- //

    // 1. تبديل الوضع الليلي
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('themeIcon');
        const isDark = html.getAttribute('data-theme') === 'dark';
        
        if (isDark) {
            html.removeAttribute('data-theme');
            icon.className = 'fa-solid fa-moon';
        } else {
            html.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
        }
        updateDashboard(); // لتحديث ألوان الرسم البياني
    }

    // 2. تصدير البيانات إلى Excel / CSV
    function exportDataToCSV() {
        const selectedSupervisor = document.getElementById('supervisorFilter').value;
        let filteredData = selectedSupervisor === 'all' ? allStudentsData : allStudentsData.filter(s => s.supervisor === selectedSupervisor);
        
        // استخدام uFEFF لدعم ترميز اللغة العربية (UTF-8 BOM) في الإكسل
        let csvContent = "\uFEFFالرقم الأكاديمي,اسم الطالب,النطاق,المشرف الأكاديمي\n";
        
        filteredData.forEach(row => {
            csvContent += `${row.id},${row.name},${row.zone},${row.supervisor}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `تقرير_التدريب_${selectedSupervisor === 'all' ? 'الكل' : selectedSupervisor}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.onload = initDashboard;
</script>

</body>
</html>
