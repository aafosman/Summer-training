<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العمادة - التدريب التطبيقي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }
        .dashboard-container::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 120px;
            background: linear-gradient(135deg, #055934 0%, #0a3d28 100%); z-index: 0;
        }
        .dashboard-container::after {
            content: ""; position: absolute; top: 120px; left: 0; right: 0; height: 6px;
            background: #C5A059; z-index: 1;
        }
        .header-content {
            position: relative; z-index: 2; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            color: #ffffff; height: 120px;
        }
        .titles-area h1 { font-size: 26px; margin: 0; font-weight: 700; }
        .titles-area p { font-size: 15px; margin: 5px 0 0; opacity: 0.9; }
        .logo-img { height: 70px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        .main-content {
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .controls-area {
            background: #f8f9fa; border: 1px solid #e2e8f0;
            padding: 20px; border-radius: 10px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .controls-area label { font-size: 18px; font-weight: 700; color: #055934; margin-left: 15px; }
        .controls-area select {
            padding: 12px 20px; font-size: 16px; border: 2px solid #ccc;
            border-radius: 8px; font-family: 'Tajawal', sans-serif;
            min-width: 300px; cursor: pointer; outline: none;
        }
        .controls-area select:focus { border-color: #055934; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            padding: 20px; border-radius: 12px; text-align: center; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; overflow: hidden;
        }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 18px; font-weight: 500; }
        .stat-card .number { font-size: 36px; font-weight: 800; margin: 0; }
        .stat-card .percentage { font-size: 14px; opacity: 0.9; margin-top: 5px; font-weight: 500; }
        
        /* ألوان البطاقات */
        .card-total { background: #34495e; }
        .card-gold { background: #C5A059; border: 2px solid #a88440; }
        .card-green { background: #1e8e3e; }
        .card-yellow { background: #f9ab00; color: #333; }
        .card-red { background: #d93025; }
        .card-unknown { background: #9e9e9e; }

        .chart-container {
            width: 100%; max-width: 500px; margin: 0 auto;
            background: white; padding: 20px; border-radius: 15px;
            border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        #loading { text-align: center; font-size: 18px; color: #666; margin: 40px 0; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="header-content">
        <div class="titles-area">
            <h1>إحصائيات التدريب التطبيقي</h1>
            <p>لوحة تحكم العمادة - الكلية التطبيقية</p>
        </div>
        <div>
            <img src="logo.jfif" alt="شعار الكلية" class="logo-img">
        </div>
    </header>

    <div class="main-content">
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري استيراد وتحليل البيانات...</div>
        
        <div id="dashboardWrapper" style="display:none;">
            <div class="controls-area">
                <div>
                    <label for="supervisorFilter"><i class="fa-solid fa-filter"></i> تصفية حسب المشرف:</label>
                    <select id="supervisorFilter" onchange="updateDashboard()">
                        <option value="all">جميع المشرفين (كل الطلاب)</option>
                        </select>
                </div>
                <div style="color:#666; font-size:14px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> تحديث مباشر
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card card-total">
                    <h3>إجمالي الطلاب</h3>
                    <div class="number" id="countTotal">0</div>
                    <div class="percentage">100%</div>
                </div>
                <div class="stat-card card-gold">
                    <h3>النطاق الذهبي <i class="fa-solid fa-star"></i></h3>
                    <div class="number" id="countGold">0</div>
                    <div class="percentage" id="pctGold">0%</div>
                </div>
                <div class="stat-card card-green">
                    <h3>النطاق الأخضر <i class="fa-solid fa-circle-check"></i></h3>
                    <div class="number" id="countGreen">0</div>
                    <div class="percentage" id="pctGreen">0%</div>
                </div>
                <div class="stat-card card-yellow">
                    <h3>النطاق الأصفر <i class="fa-solid fa-triangle-exclamation"></i></h3>
                    <div class="number" id="countYellow">0</div>
                    <div class="percentage" id="pctYellow">0%</div>
                </div>
                <div class="stat-card card-red">
                    <h3>النطاق الأحمر <i class="fa-solid fa-circle-exclamation"></i></h3>
                    <div class="number" id="countRed">0</div>
                    <div class="percentage" id="pctRed">0%</div>
                </div>
                <div class="stat-card card-unknown">
                    <h3>غير محدد <i class="fa-solid fa-circle-question"></i></h3>
                    <div class="number" id="countUnknown">0</div>
                    <div class="percentage" id="pctUnknown">0%</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="zonesChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const sheetDataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSORepMr-6bAomcs1Myh3qsrHPg9ks06TN1qZ9840GRo-fsLX2xQt7__kTgamr57mY82MaRWnOuAQ0/pub?gid=216850767&single=true&output=csv';
    
    let allStudentsData = []; // لتخزين جميع البيانات
    let myChart = null; // كائن الرسم البياني

    // الدالة الرئيسية التي تعمل عند فتح الصفحة
    async function initDashboard() {
        try {
            const response = await fetch(sheetDataUrl + '&t=' + new Date().getTime());
            const data = await response.text();
            
            // معالجة البيانات من CSV
            const rows = data.split('\n');
            let supervisorsSet = new Set(); // لاستخراج أسماء المشرفين بدون تكرار

            for (let i = 1; i < rows.length; i++) {
                let cols = [];
                let inQuotes = false;
                let col = '';
                for (let char of rows[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cols.push(col); col = ''; }
                    else col += char;
                }
                cols.push(col);

                // ترتيب الأعمدة: 0(رقم)، 1(اسم)، 2(نطاق)، 3(مشرف)
                if (cols.length >= 4 && cols[0].trim() !== '') {
                    const zone = cols[2].replace(/["\r]/g, '').trim();
                    const supervisor = cols[3].replace(/["\r]/g, '').trim() || 'بدون مشرف';
                    
                    allStudentsData.push({
                        zone: zone,
                        supervisor: supervisor
                    });
                    
                    if(supervisor !== 'بدون مشرف') {
                        supervisorsSet.add(supervisor);
                    }
                }
            }

            // تعبئة القائمة المنسدلة بأسماء المشرفين
            const supervisorSelect = document.getElementById('supervisorFilter');
            supervisorsSet.forEach(sup => {
                let option = document.createElement('option');
                option.value = sup;
                option.text = sup;
                supervisorSelect.appendChild(option);
            });

            // إخفاء التحميل وعرض اللوحة
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardWrapper').style.display = 'block';

            // تحديث البيانات وعرضها لأول مرة (الكل)
            updateDashboard();

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = '<span style="color:red;">حدث خطأ في تحميل البيانات. يرجى المحاولة لاحقاً.</span>';
        }
    }

    // دالة تحديث الأرقام والرسم البياني بناءً على الفلتر
    function updateDashboard() {
        const selectedSupervisor = document.getElementById('supervisorFilter').value;
        
        // تصفية البيانات
        let filteredData = allStudentsData;
        if (selectedSupervisor !== 'all') {
            filteredData = allStudentsData.filter(student => student.supervisor === selectedSupervisor);
        }

        // حساب الأعداد
        const total = filteredData.length;
        let counts = { gold: 0, green: 0, yellow: 0, red: 0, unknown: 0 };

        filteredData.forEach(student => {
            if (student.zone === 'ذهبي') counts.gold++;
            else if (student.zone === 'أخضر') counts.green++;
            else if (student.zone === 'أصفر') counts.yellow++;
            else if (student.zone === 'أحمر') counts.red++;
            else counts.unknown++; // غير محدد
        });

        // دوال مساعدة لحساب النسبة المئوية
        const calcPct = (num, tot) => tot === 0 ? 0 : Math.round((num / tot) * 100);

        // تحديث البطاقات
        document.getElementById('countTotal').innerText = total;
        
        document.getElementById('countGold').innerText = counts.gold;
        document.getElementById('pctGold').innerText = calcPct(counts.gold, total) + '%';
        
        document.getElementById('countGreen').innerText = counts.green;
        document.getElementById('pctGreen').innerText = calcPct(counts.green, total) + '%';
        
        document.getElementById('countYellow').innerText = counts.yellow;
        document.getElementById('pctYellow').innerText = calcPct(counts.yellow, total) + '%';
        
        document.getElementById('countRed').innerText = counts.red;
        document.getElementById('pctRed').innerText = calcPct(counts.red, total) + '%';
        
        document.getElementById('countUnknown').innerText = counts.unknown;
        document.getElementById('pctUnknown').innerText = calcPct(counts.unknown, total) + '%';

        // تحديث الرسم البياني
        drawChart(counts.gold, counts.green, counts.yellow, counts.red, counts.unknown);
    }

    // دالة رسم المخطط البياني باستخدام Chart.js
    function drawChart(gold, green, yellow, red, unknown) {
        const ctx = document.getElementById('zonesChart').getContext('2d');
        
        // مسح الرسم القديم إن وجد لتحديثه
        if (myChart) {
            myChart.destroy();
        }

        Chart.defaults.font.family = 'Tajawal';
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['الذهبي', 'الأخضر', 'الأصفر', 'الأحمر', 'غير محدد'],
                datasets: [{
                    data: [gold, green, yellow, red, unknown],
                    backgroundColor: [
                        '#C5A059', // ذهبي
                        '#1e8e3e', // أخضر
                        '#f9ab00', // أصفر
                        '#d93025', // أحمر
                        '#9e9e9e'  // رمادي (غير محدد)
                    ],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%', // حجم الدائرة الداخلية
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { size: 14, family: 'Tajawal' }, padding: 20 }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                let value = context.raw;
                                let total = context.chart._metasets[context.datasetIndex].total;
                                let percentage = Math.round((value / total) * 100) + '%';
                                return label + ': ' + value + ' طالب (' + percentage + ')';
                            }
                        }
                    }
                }
            }
        });
    }

    // تشغيل الدالة الرئيسية عند تحميل الصفحة
    window.onload = initDashboard;
</script>

</body>
</html>
