<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التدريب التطبيقي - الكلية التطبيقية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 160px;
            background: linear-gradient(135deg, #055934 0%, #0a3d28 100%);
            z-index: 0;
        }

        .main-container::after {
            content: "";
            position: absolute;
            top: 160px; left: 0; right: 0; height: 6px;
            background: #C5A059;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            height: 160px;
        }

        .titles-area {
            text-align: right;
        }

        .titles-area h1 {
            font-size: 28px; margin: 0; font-weight: 700;
        }

        .titles-area p {
            font-size: 16px; margin: 8px 0 0; opacity: 0.9;
        }

        .logo-img {
            height: 80px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            object-fit: contain;
        }

        .main-dashboard {
            z-index: 2;
            padding: 50px 40px;
            display: flex;
            justify-content: center;
        }

        .search-card {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .search-card h2 {
            color: #055934; font-size: 22px; margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: #C5A059;
            outline: none;
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        .btn-query {
            background-color: #055934;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-query:hover {
            background-color: #0a3d28;
            transform: translateY(-2px);
        }

        #resultContainer {
            margin-top: 30px;
            display: none;
        }

        .zone-card {
            padding: 15px;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .notes-area {
            margin-top: 15px;
            background: #fdfcf0;
            border: 1px solid #C5A059;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #444;
            text-align: right;
        }

        .footer-legend {
            padding: 20px 40px;
            background: #f8f9fa;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #eee;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .dot { width: 14px; height: 14px; border-radius: 50%; }

        .bg-red { background-color: #d93025; }
        .bg-yellow { background-color: #f9ab00; color: #000 !important; }
        .bg-green { background-color: #1e8e3e; }
        .bg-gold { background-color: #C5A059; border: 2px solid #9e7e3a; }
    </style>
</head>
<body>

<div class="main-container">
    <header class="header-content">
        <div class="titles-area">
            <h1>الكلية التطبيقية</h1>
            <p>التدريب التطبيقي 1447هـ - 1448 هـ</p>
        </div>
        <div>
            <img src="logo.jfif" alt="شعار الكلية" class="logo-img">        </div>
    </header>

    <main class="main-dashboard">
        <div class="search-card">
            <h2>استعلام حالة الطالب</h2>
            <input type="text" id="studentId" placeholder="أدخل الرقم الأكاديمي">
            <button class="btn-query" onclick="checkStatus()">
                <i class="fa-solid fa-magnifying-glass"></i> عرض النطاق
            </button>

            <div id="loading" style="display:none; margin-top:20px; color:#666; font-size:14px;">
                <i class="fa-solid fa-circle-notch fa-spin"></i> جاري استرجاع البيانات...
            </div>

            <div id="resultContainer">
                <div id="zoneIndicator" class="zone-card"></div>
                <div id="notesBox" class="notes-area"></div>
            </div>
        </div>
    </main>

    <footer class="footer-legend">
        <div class="legend-item"><span class="dot bg-gold"></span> الذهبي: مبادرات متميزة</div>
        <div class="legend-item"><span class="dot bg-green"></span> الأخضر: منتظم</div>
        <div class="legend-item"><span class="dot bg-yellow"></span> الأصفر: إنذار أول</div>
        <div class="legend-item"><span class="dot bg-red"></span> الأحمر: إنذار ثاني</div>
    </footer>
</div>

<script>
    const sheetDataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSORepMr-6bAomcs1Myh3qsrHPg9ks06TN1qZ9840GRo-fsLX2xQt7__kTgamr57mY82MaRWnOuAQ0/pub?gid=0&single=true&output=csv';

    async function checkStatus() {
        const studentId = document.getElementById('studentId').value.trim();
        const container = document.getElementById('resultContainer');
        const indicator = document.getElementById('zoneIndicator');
        const notesBox = document.getElementById('notesBox');
        const loading = document.getElementById('loading');

        if (!studentId) {
            alert("يرجى إدخال الرقم الأكاديمي");
            return;
        }

        container.style.display = 'none';
        loading.style.display = 'block';

        try {
            const response = await fetch(sheetDataUrl + '&t=' + new Date().getTime());
            const data = await response.text();
            const rows = data.split('\n');
            let found = false;

            for (let i = 1; i < rows.length; i++) {
                let cols = [];
                let inQuotes = false;
                let col = '';
                for (let char of rows[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cols.push(col); col = ''; }
                    else col += char;
                }
                cols.push(col);

                if (cols.length >= 3) {
                    const id = cols[0].replace(/["\r]/g, '').trim();
                    const zone = cols[2].replace(/["\r]/g, '').trim();
                    const notes = cols.length >= 4 ? cols[3].replace(/["\r]/g, '').trim() : '';

                    if (id === studentId) {
                        displayResult(zone, notes);
                        found = true;
                        break;
                    }
                }
            }

            if (!found) {
                indicator.className = 'zone-card';
                indicator.style.backgroundColor = '#fce8e6';
                indicator.style.color = '#c5221f';
                indicator.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> الرقم الأكاديمي غير مسجل';
                notesBox.style.display = 'none';
                container.style.display = 'block';
            }

        } catch (error) {
            alert("حدث خطأ في الاتصال بقاعدة البيانات. يرجى المحاولة لاحقاً.");
        } finally {
            loading.style.display = 'none';
        }
    }

    function displayResult(zone, notes) {
        const container = document.getElementById('resultContainer');
        const indicator = document.getElementById('zoneIndicator');
        const notesBox = document.getElementById('notesBox');
        
        container.style.display = 'block';
        indicator.className = 'zone-card';

        if (zone === 'أحمر') {
            indicator.classList.add('bg-red');
            indicator.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> النطاق الأحمر';
        } else if (zone === 'أصفر') {
            indicator.classList.add('bg-yellow');
            indicator.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> النطاق الأصفر';
        } else if (zone === 'أخضر') {
            indicator.classList.add('bg-green');
            indicator.innerHTML = '<i class="fa-solid fa-circle-check"></i> النطاق الأخضر';
        } else if (zone === 'ذهبي') {
            indicator.classList.add('bg-gold');
            indicator.innerHTML = '<i class="fa-solid fa-star"></i> النطاق الذهبي';
        } else {
            indicator.style.backgroundColor = '#eee'; indicator.style.color = '#333';
            indicator.innerHTML = 'مسجل - لم يحدد النطاق بعد';
        }

        if (notes && notes !== '') {
            notesBox.style.display = 'block';
            notesBox.innerHTML = '<strong>ملاحظات المشرف:</strong> ' + notes;
        } else {
            notesBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
