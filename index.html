<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة التدريب الميداني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        #resultBox {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .notes-box {
            margin-top: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 6px;
            font-size: 14px;
            color: #444;
            display: none;
        }
        .loading {
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>حالة التدريب الميداني</h2>
    <p style="color: #666; font-size: 14px;">أدخل رقمك الأكاديمي لمعرفة نطاقك الحالي والملاحظات</p>
    
    <input type="text" id="studentId" placeholder="مثال: 225000000">
    <button onclick="checkStatus()">عرض النطاق</button>
    
    <div id="loading" class="loading" style="display: none;">جاري البحث عن السجل...</div>
    <div id="resultBox"></div>
    <div id="notesBox" class="notes-box"></div>
</div>

<script>
    // الرابط المباشر الجديد لملف Google Sheets بصيغة CSV
    const sheetDataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSORepMr-6bAomcs1Myh3qsrHPg9ks06TN1qZ9840GRo-fsLX2xQt7__kTgamr57mY82MaRWnOuAQ0/pub?gid=0&single=true&output=csv';

    async function checkStatus() {
        const studentId = document.getElementById('studentId').value.trim();
        const resultBox = document.getElementById('resultBox');
        const notesBox = document.getElementById('notesBox');
        const loading = document.getElementById('loading');

        if (!studentId) {
            alert("الرجاء إدخال الرقم الأكاديمي!");
            return;
        }

        resultBox.style.display = 'none';
        notesBox.style.display = 'none';
        loading.style.display = 'block';

        try {
            // إضافة وقت عشوائي للرابط لمنع المتصفح من تخزين نسخة قديمة (Cache)
            const response = await fetch(sheetDataUrl + '&t=' + new Date().getTime());
            const data = await response.text();
            
            const rows = data.split('\n');
            let found = false;

            // البدء من الصف الثاني (i=1) لتجاوز عناوين الأعمدة
            for (let i = 1; i < rows.length; i++) {
                
                // دالة بسيطة لقراءة الفواصل في CSV دون التأثر بالفواصل داخل الملاحظات
                let cols = [];
                let inQuotes = false;
                let col = '';
                for (let char of rows[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cols.push(col); col = ''; }
                    else col += char;
                }
                cols.push(col);
                
                if (cols.length >= 3) {
                    const id = cols[0].replace(/["\r]/g, '').trim();
                    const zone = cols[2].replace(/["\r]/g, '').trim();
                    const notes = cols.length >= 4 ? cols[3].replace(/["\r]/g, '').trim() : '';

                    if (id === studentId) {
                        showZone(zone, notes);
                        found = true;
                        break;
                    }
                }
            }

            if (!found) {
                resultBox.style.display = 'block';
                resultBox.style.backgroundColor = '#f8d7da';
                resultBox.style.color = '#721c24';
                resultBox.innerHTML = 'لم يتم العثور على الرقم الأكاديمي. تأكد من الإدخال.';
            }

        } catch (error) {
            console.error("Error fetching data:", error);
            resultBox.style.display = 'block';
            resultBox.style.backgroundColor = '#f8d7da';
            resultBox.style.color = '#721c24';
            resultBox.innerHTML = 'حدث خطأ في الاتصال بقاعدة البيانات. يرجى المحاولة لاحقاً.';
        } finally {
            loading.style.display = 'none';
        }
    }

    function showZone(zone, notes) {
        const resultBox = document.getElementById('resultBox');
        const notesBox = document.getElementById('notesBox');
        
        resultBox.style.display = 'block';
        resultBox.style.border = 'none';

        if (zone === 'أحمر') {
            resultBox.style.backgroundColor = '#ff4d4d';
            resultBox.style.color = 'white';
            resultBox.innerHTML = '🔴 النطاق الأحمر<br><span style="font-size:14px; font-weight:normal;">غير منتظم وحاصل على إنذار ثاني</span>';
        } else if (zone === 'أصفر') {
            resultBox.style.backgroundColor = '#ffcc00';
            resultBox.style.color = 'black';
            resultBox.innerHTML = '🟡 النطاق الأصفر<br><span style="font-size:14px; font-weight:normal;">حاصل على إنذار أول</span>';
        } else if (zone === 'أخضر') {
            resultBox.style.backgroundColor = '#4caf50';
            resultBox.style.color = 'white';
            resultBox.innerHTML = '🟢 النطاق الأخضر<br><span style="font-size:14px; font-weight:normal;">منتظم في التدريب</span>';
        } else if (zone === 'ذهبي') {
            resultBox.style.backgroundColor = '#ffd700';
            resultBox.style.color = 'black';
            resultBox.style.border = '2px solid #daa520';
            resultBox.innerHTML = '⭐ النطاق الذهبي<br><span style="font-size:14px; font-weight:normal;">أداء متميز ومبادرات مفيدة</span>';
        } else {
            resultBox.style.backgroundColor = '#e2e3e5';
            resultBox.style.color = '#383d41';
            resultBox.innerHTML = 'الرقم الأكاديمي مسجل، ولكن لم يتم تحديد النطاق بعد.';
        }

        if (notes && notes !== '') {
            notesBox.style.display = 'block';
            notesBox.innerHTML = '<strong>ملاحظات المشرف:</strong><br>' + notes;
        } else {
            notesBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
